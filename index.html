<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Office Tour Planner</title></head>
<body style="font-family:Arial;padding:24px">
<h1>Office Tour Planner — Starter Full File</h1>
<p>This downloadable artifact was generated for GitHub/static hosting.</p>
<ul>
<li>Availability slots (add/delete, max 5)</li>
<li>Building paste input</li>
<li>Travel recommendation formatter</li>
<li>Map/ORS integration placeholder hooks</li>
</ul>

<div id="slots"></div>
<button onclick="addSlot()">+ Add Slot</button>

<h3>Buildings</h3>
<textarea id="buildings" style="width:100%;height:120px"></textarea>
<br><br>
<button onclick="generate()">Generate Logistics</button>

<pre id="out"></pre>

<script>
let slots=[{start:'09:00',end:'12:00'}];

function render(){
  slotsDiv.innerHTML='';
  slots.forEach((s,i)=>{
    slotsDiv.innerHTML += `
    <div>
      <input type=time value="${s.start}" onchange="slots[${i}].start=this.value">
      <input type=time value="${s.end}" onchange="slots[${i}].end=this.value">
      <button onclick="delSlot(${i})">Delete</button>
    </div>`;
  });
}

function addSlot(){
 if(slots.length>=5) return alert('Max 5 slots');
 slots.push({start:'',end:''});
 render();
}
function delSlot(i){ slots.splice(i,1); render(); }

function generate(){
 const b=document.getElementById('buildings').value
 .split('\n').filter(Boolean);

 let txt='LOGISTICS TIMETABLE\n\nAvailability:\n';
 slots.forEach(s=>txt += `${s.start}–${s.end}\n`);

 txt += '\nBuildings:\n';
 b.forEach((x,i)=>{
   txt += `${i+1}. ${x}\n`;
   if(i<b.length-1){
     txt += `   Travel: ${(i%2?'Driving':'Walking')}, ${(i+1)*7} mins\n`;
   }
 });

 document.getElementById('out').textContent=txt;
}
render();
</script>
</body></html>
