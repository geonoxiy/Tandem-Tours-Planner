<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Office Tour Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --border-strong: #C8C2B8;
    --text: #1A1816;
    --text-muted: #7A7570;
    --text-hint: #B0AAA3;
    --accent: #2D5A3D;
    --accent-light: #EAF2EC;
    --accent-mid: #4A8C5C;
    --warn: #C17B2A;
    --warn-light: #FDF3E3;
    --danger: #B03A2E;
    --danger-light: #FDECEA;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 10px;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; overflow: hidden; }

  /* ── Shell: header + resizable left + resizable right ── */
  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    flex-shrink: 0;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 10px;
    z-index: 10;
  }
  .logo-mark {
    width: 26px; height: 26px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 15px; height: 15px; fill: none; stroke: #fff; stroke-width: 2; }
  header h1 { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
  header span { font-size: 12px; color: var(--text-muted); }
  .api-badge {
    margin-left: auto;
    font-size: 11px;
    font-family: var(--mono);
    background: var(--accent-light);
    color: var(--accent);
    border: 1px solid #C5DFC9;
    padding: 2px 9px;
    border-radius: 20px;
  }

  /* Horizontal split: left panel | v-drag | right panel */
  .h-split {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  .left-panel {
    width: 400px;
    min-width: 260px;
    max-width: 600px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .left-panel-scroll { overflow-y: auto; flex: 1; }

  /* Vertical drag handle between panels */
  .v-drag {
    width: 5px;
    cursor: col-resize;
    background: transparent;
    flex-shrink: 0;
    transition: background 0.15s;
    z-index: 5;
  }
  .v-drag:hover, .v-drag.dragging { background: var(--accent-mid); }

  /* Right: map on top, h-drag, output on bottom */
  .right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  #map { flex: 1; min-height: 120px; }

  /* Horizontal drag handle between map and output */
  .h-drag {
    height: 5px;
    cursor: row-resize;
    background: transparent;
    flex-shrink: 0;
    transition: background 0.15s;
    z-index: 5;
  }
  .h-drag:hover, .h-drag.dragging { background: var(--accent-mid); }

  .output-panel {
    height: 280px;
    min-height: 80px;
    max-height: 80vh;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .output-toolbar {
    display: flex;
    align-items: center;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
    flex-shrink: 0;
  }
  .output-toolbar-label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; flex: 1; }
  .output-body { flex: 1; overflow: auto; }

  /* ── Table output ── */
  .itinerary-wrap { padding: 12px 16px; min-width: 600px; }
  .itin-header { margin-bottom: 10px; }
  .itin-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .itin-meta { font-size: 11px; color: var(--text-muted); font-family: var(--mono); margin-top: 2px; }

  table.itin {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  table.itin th {
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 6px 10px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  table.itin td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    font-family: var(--mono);
    color: var(--text);
  }
  table.itin tr:last-child td { border-bottom: none; }
  table.itin tr:hover td { background: var(--bg); }
  .travel-row td {
    background: var(--warn-light) !important;
    color: var(--warn) !important;
    font-size: 11px;
    padding: 4px 10px;
    font-style: italic;
  }
  .travel-row:hover td { background: var(--warn-light) !important; }
  .badge-located { color: var(--accent); font-size: 10px; }
  .badge-missing { color: var(--danger); font-size: 10px; }

  /* ── Left panel sections ── */
  .panel-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;
  }
  textarea {
    width: 100%; min-height: 100px; resize: vertical;
    font-family: var(--mono); font-size: 12px;
    padding: 9px 11px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); line-height: 1.7;
    transition: border-color 0.15s;
  }
  textarea:focus { outline: none; border-color: var(--accent-mid); }
  textarea::placeholder { color: var(--text-hint); }
  .input-row { display: flex; gap: 8px; margin-top: 8px; }
  .field { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .field label { font-size: 10px; color: var(--text-muted); font-weight: 500; }
  input[type="time"], input[type="number"], input[type="text"] {
    font-family: var(--mono); font-size: 12px;
    padding: 6px 9px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); width: 100%;
    transition: border-color 0.15s;
  }
  input:focus { outline: none; border-color: var(--accent-mid); }
  .mode-toggle { display: flex; gap: 6px; margin-top: 8px; }
  .mode-btn {
    flex: 1; padding: 6px;
    font-family: var(--sans); font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: transparent; color: var(--text-muted); cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .mode-btn:hover { background: var(--bg); }
  .mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-parse {
    width: 100%; padding: 9px;
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius);
    font-family: var(--sans); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s; margin-top: 10px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-parse:hover { opacity: 0.88; }
  .btn-parse:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Stop cards */
  .stops-list { padding: 14px; display: flex; flex-direction: column; }
  .stop-item { position: relative; padding-left: 26px; padding-bottom: 18px; }
  .stop-item:last-child { padding-bottom: 0; }
  .stop-line { position: absolute; left: 9px; top: 20px; bottom: 0; width: 1px; background: var(--border); }
  .stop-item:last-child .stop-line { display: none; }
  .stop-dot {
    position: absolute; left: 4px; top: 5px;
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--surface); border: 2px solid var(--border-strong);
  }
  .stop-dot.first { border-color: var(--accent); background: var(--accent); }
  .stop-dot.last  { border-color: var(--warn);   background: var(--warn);   }
  .stop-card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px;
  }
  .stop-num  { font-size: 10px; font-family: var(--mono); color: var(--text-hint); }
  .stop-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .stop-address { font-size: 11px; color: var(--text-muted); margin-top: 1px; font-family: var(--mono); }
  .stop-inputs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .stop-inputs .field label { font-size: 10px; }
  .stop-inputs input { font-size: 11px; padding: 4px 7px; }
  .travel-seg { display: flex; align-items: center; gap: 6px; padding: 5px 0; }
  .travel-pill {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 2px 9px;
    font-size: 11px; font-family: var(--mono); color: var(--text-muted); white-space: nowrap;
  }
  .travel-pill.loaded  { color: var(--accent); border-color: #C5DFC9; background: var(--accent-light); }
  .travel-pill.loading { color: var(--warn);   border-color: #F0D9B0; background: var(--warn-light);   }
  .travel-pill.error   { color: var(--danger); border-color: #F5C6C2; background: var(--danger-light);  }
  .travel-pill.estimate { color: #666; border-color: var(--border); background: var(--bg); font-style: italic; }

  /* Buttons */
  .btn-gen {
    padding: 5px 12px; background: var(--accent); color: #fff; border: none;
    border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: var(--sans); transition: opacity 0.15s;
  }
  .btn-gen:hover { opacity: 0.88; }
  .btn-gen:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-copy {
    padding: 5px 11px; background: transparent; color: var(--text-muted);
    border: 1px solid var(--border); border-radius: 6px; font-size: 12px;
    cursor: pointer; font-family: var(--sans);
  }
  .btn-copy:hover { background: var(--bg); }
  .placeholder-msg { font-size: 13px; color: var(--text-hint); font-style: italic; padding: 14px 16px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 12px; height: 12px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle;
  }
  .leaflet-container { font-family: var(--sans); }
  .custom-marker {
    width: 24px; height: 24px; background: var(--accent); border: 2px solid #fff;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 10px; font-weight: 700;
    box-shadow: 0 2px 5px rgba(0,0,0,0.25); font-family: var(--sans);
  }
  .custom-marker.last { background: var(--warn); }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 16 16"><path d="M8 2C5.8 2 4 3.8 4 6c0 3 4 8 4 8s4-5 4-8c0-2.2-1.8-4-4-4z" stroke-linejoin="round"/><circle cx="8" cy="6" r="1.5"/></svg>
    </div>
    <h1>Office Tour Planner</h1>
    <span>— leasing itinerary builder</span>
    <div class="api-badge">ORS routing ✓</div>
  </header>

  <div class="h-split">
    <!-- LEFT PANEL -->
    <div class="left-panel" id="leftPanel">
      <div class="left-panel-scroll">
        <div class="panel-section">
          <div class="section-label">Locations</div>
          <textarea id="locInput" placeholder="One per line — City + Address + Suite/Floor:
San Francisco 233 Sansome St (Suite 1008)
San Francisco 233 Sansome St (Suite 200)
San Francisco 220 Sansome St 7th Floor
San Francisco 111 Pine St (Suite 1615)"></textarea>
          <div class="input-row">
            <div class="field">
              <label>Start time</label>
              <input type="time" id="startTime" value="09:00" />
            </div>
            <div class="field">
              <label>Default visit (min)</label>
              <input type="number" id="defaultDur" value="30" min="5" max="240" />
            </div>
          </div>
          <div class="section-label" style="margin-top:12px; margin-bottom:5px;">Travel mode</div>
          <div class="mode-toggle">
            <button class="mode-btn active" id="modeD" onclick="setMode('driving-car')">🚗 Driving</button>
            <button class="mode-btn" id="modeW" onclick="setMode('foot-walking')">🚶 Walking</button>
          </div>
          <button class="btn-parse" id="parseBtn" onclick="parseAndGeocode()">
            <span id="parseBtnText">Parse & load locations</span>
          </button>
        </div>
        <div class="stops-list" id="stopsList">
          <div class="placeholder-msg" style="padding: 6px 0;">Paste locations above and click Parse.</div>
        </div>
      </div>
    </div>

    <!-- VERTICAL DRAG HANDLE -->
    <div class="v-drag" id="vDrag"></div>

    <!-- RIGHT PANEL -->
    <div class="right-panel" id="rightPanel">
      <div id="map"></div>

      <!-- HORIZONTAL DRAG HANDLE -->
      <div class="h-drag" id="hDrag"></div>

      <div class="output-panel" id="outputPanel">
        <div class="output-toolbar">
          <span class="output-toolbar-label">Itinerary</span>
          <button class="btn-gen" id="genBtn" onclick="generateItinerary()" disabled>Generate itinerary</button>
          <button class="btn-copy" id="copyBtn" onclick="copyItinerary()">Copy as text</button>
        </div>
        <div class="output-body" id="outputBody">
          <div class="placeholder-msg" id="outputPlaceholder">Your itinerary table will appear here once you load your stops.</div>
          <div id="itineraryTable" style="display:none;"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const ORS_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBhYjBkMzUwNDZmMTQ4NGU5YTczYjEzY2YxOTJiYTVmIiwiaCI6Im11cm11cjY0In0=';
let travelMode = 'driving-car';
let stops = [];
let travelSegments = [];
let map, routeLayer;
let markers = [];

// ── Map init ──
map = L.map('map', { zoomControl: true }).setView([37.7935, -122.4016], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

// ── Resizable panels ──
(function() {
  // Vertical drag (left panel width)
  const vDrag = document.getElementById('vDrag');
  const leftPanel = document.getElementById('leftPanel');
  let vDragging = false, vStartX, vStartW;
  vDrag.addEventListener('mousedown', e => {
    vDragging = true; vStartX = e.clientX; vStartW = leftPanel.offsetWidth;
    vDrag.classList.add('dragging'); document.body.style.userSelect = 'none';
    document.body.style.cursor = 'col-resize';
  });
  document.addEventListener('mousemove', e => {
    if (!vDragging) return;
    const newW = Math.min(600, Math.max(260, vStartW + (e.clientX - vStartX)));
    leftPanel.style.width = newW + 'px';
    map.invalidateSize();
  });
  document.addEventListener('mouseup', () => {
    if (!vDragging) return;
    vDragging = false; vDrag.classList.remove('dragging');
    document.body.style.userSelect = ''; document.body.style.cursor = '';
  });

  // Horizontal drag (output panel height)
  const hDrag = document.getElementById('hDrag');
  const outputPanel = document.getElementById('outputPanel');
  let hDragging = false, hStartY, hStartH;
  hDrag.addEventListener('mousedown', e => {
    hDragging = true; hStartY = e.clientY; hStartH = outputPanel.offsetHeight;
    hDrag.classList.add('dragging'); document.body.style.userSelect = 'none';
    document.body.style.cursor = 'row-resize';
  });
  document.addEventListener('mousemove', e => {
    if (!hDragging) return;
    const newH = Math.min(window.innerHeight * 0.8, Math.max(80, hStartH + (hStartY - e.clientY)));
    outputPanel.style.height = newH + 'px';
    map.invalidateSize();
  });
  document.addEventListener('mouseup', () => {
    if (!hDragging) return;
    hDragging = false; hDrag.classList.remove('dragging');
    document.body.style.userSelect = ''; document.body.style.cursor = '';
  });
})();

// ── Mode toggle ──
function setMode(m) {
  travelMode = m;
  document.getElementById('modeD').classList.toggle('active', m === 'driving-car');
  document.getElementById('modeW').classList.toggle('active', m === 'foot-walking');
}

// ── Geocode ──
async function geocode(query) {
  try {
    const url = `https://api.openrouteservice.org/geocode/search?api_key=${ORS_KEY}&text=${encodeURIComponent(query)}&size=1`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.features && d.features.length > 0) {
      const [lng, lat] = d.features[0].geometry.coordinates;
      return { lat, lng, label: d.features[0].properties.label };
    }
  } catch(e) {}
  return null;
}

// ── Travel time: ORS first, fallback to distance estimate ──
function haversineKm(a, b) {
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const x = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180) * Math.cos(b.lat*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function estimateFromDistance(from, to) {
  const km = haversineKm(from, to);
  // Road distance is ~1.3x straight-line in urban areas
  const roadKm = +(km * 1.3).toFixed(1);
  // Speed assumptions: driving ~25 km/h urban, walking ~4.5 km/h
  const speedKmh = travelMode === 'driving-car' ? 25 : 4.5;
  const mins = Math.round((roadKm / speedKmh) * 60);
  return { mins, km: roadKm, coords: [], estimated: true };
}

async function getTravelTime(from, to) {
  try {
    const url = `https://api.openrouteservice.org/v2/directions/${travelMode}?api_key=${ORS_KEY}&start=${from.lng},${from.lat}&end=${to.lng},${to.lat}`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.features && d.features.length > 0) {
      const seg = d.features[0].properties.segments[0];
      const mins = Math.round(seg.duration / 60);
      const km = (seg.distance / 1000).toFixed(1);
      const coords = d.features[0].geometry.coordinates.map(c => [c[1], c[0]]);
      return { mins, km, coords, estimated: false };
    }
  } catch(e) {}
  // Fallback to distance-based estimate
  return estimateFromDistance(from, to);
}

// ── Parse & geocode ──
async function parseAndGeocode() {
  const raw = document.getElementById('locInput').value.trim();
  if (!raw) return;
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const defaultDur = parseInt(document.getElementById('defaultDur').value) || 30;

  const btn = document.getElementById('parseBtn');
  const btnText = document.getElementById('parseBtnText');
  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span> Geocoding...';

  stops = lines.map((line, i) => {
    let raw = line.trim();
    let suiteNote = '';
    const parenMatch = raw.match(/\(([^)]+)\)/);
    if (parenMatch) { suiteNote = parenMatch[1].trim(); raw = raw.replace(/\s*\([^)]+\)/, '').trim(); }
    const floorMatch = raw.match(/\b(\d+(?:st|nd|rd|th)?\s*[Ff]loor|\d+[Ff])\b/);
    if (floorMatch && !suiteNote) { suiteNote = floorMatch[0].trim(); raw = raw.replace(floorMatch[0], '').trim(); }
    const geocodeQuery = raw;
    const words = raw.split(' ');
    let displayName, displayAddress;
    if (words.length > 1 && !/^\d/.test(words[0]) && /^\d/.test(words[1])) {
      displayName = words.slice(1).join(' ');
      displayAddress = words[0];
    } else { displayName = raw; displayAddress = ''; }
    return { id: i, raw: line, geocodeQuery, name: displayName, address: displayAddress, duration: defaultDur, timeSlot: '', notes: suiteNote, coords: null };
  });

  for (let i = 0; i < stops.length; i++) {
    btnText.innerHTML = `<span class="spinner"></span> Geocoding ${i+1}/${stops.length}...`;
    const result = await geocode(stops[i].geocodeQuery);
    if (result) stops[i].coords = result;
  }

  travelSegments = new Array(stops.length - 1).fill(null);
  renderStops();
  plotMarkers();
  await fetchAllTravelTimes();

  btn.disabled = false;
  btnText.textContent = 'Re-parse & reload';
  document.getElementById('genBtn').disabled = false;
}

async function fetchAllTravelTimes() {
  for (let i = 0; i < stops.length - 1; i++) {
    if (!stops[i].coords || !stops[i+1].coords) {
      updateTravelPill(i, 'error', 'coords missing');
      continue;
    }
    updateTravelPill(i, 'loading', 'fetching...');
    const result = await getTravelTime(stops[i].coords, stops[i+1].coords);
    travelSegments[i] = result;
    if (result.estimated) {
      updateTravelPill(i, 'estimate', `~${result.mins} min · ${result.km} km (est.)`);
    } else {
      updateTravelPill(i, 'loaded', `~${result.mins} min · ${result.km} km`);
    }
  }
  drawRoute();
}

function updateTravelPill(idx, state, text) {
  const el = document.getElementById(`travel_${idx}`);
  if (!el) return;
  el.className = `travel-pill ${state}`;
  el.textContent = (travelMode === 'driving-car' ? '🚗 ' : '🚶 ') + text;
}

function renderStops() {
  const container = document.getElementById('stopsList');
  if (!stops.length) { container.innerHTML = '<div class="placeholder-msg" style="padding:6px 0;">Paste locations above and click Parse.</div>'; return; }
  let html = '';
  stops.forEach((s, i) => {
    const isFirst = i === 0, isLast = i === stops.length - 1;
    html += `<div class="stop-item">
      <div class="stop-dot ${isFirst?'first':isLast?'last':''}"></div>
      <div class="stop-line"></div>
      <div class="stop-card">
        <div class="stop-num">Stop ${i+1} of ${stops.length}</div>
        <div class="stop-name">${s.name}</div>
        ${s.address ? `<div class="stop-address">${s.address}</div>` : ''}
        <div class="${s.coords?'badge-located':'badge-missing'}">${s.coords?'📍 Located':'⚠ Not found'}</div>
        <div class="stop-inputs">
          <div class="field">
            <label>Appt. time</label>
            <input type="time" id="ts_${i}" value="${s.timeSlot}" onchange="stops[${i}].timeSlot=this.value" />
          </div>
          <div class="field" style="max-width:80px;">
            <label>Duration (min)</label>
            <input type="number" id="dur_${i}" value="${s.duration}" min="5" onchange="stops[${i}].duration=parseInt(this.value)||30" />
          </div>
          <div class="field" style="flex:2; min-width:140px;">
            <label>Suite / Notes</label>
            <input type="text" id="notes_${i}" value="${s.notes}" placeholder="Suite 1008, contact..." onchange="stops[${i}].notes=this.value" />
          </div>
        </div>
      </div>
    </div>`;
    if (i < stops.length - 1) {
      html += `<div class="travel-seg"><div class="travel-pill" id="travel_${i}">—</div></div>`;
    }
  });
  container.innerHTML = html;
}

function plotMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const bounds = [];
  stops.forEach((s, i) => {
    if (!s.coords) return;
    const isLast = i === stops.length - 1;
    const icon = L.divIcon({
      className: '',
      html: `<div class="custom-marker ${isLast?'last':''}">${i+1}</div>`,
      iconSize: [24,24], iconAnchor: [12,12]
    });
    const m = L.marker([s.coords.lat, s.coords.lng], { icon })
      .addTo(map)
      .bindPopup(`<strong>${s.name}</strong><br>${s.notes||s.address||''}`);
    markers.push(m);
    bounds.push([s.coords.lat, s.coords.lng]);
  });
  if (bounds.length > 0) map.fitBounds(bounds, { padding: [40, 40] });
}

function drawRoute() {
  if (routeLayer) map.removeLayer(routeLayer);
  const allCoords = [];
  travelSegments.forEach(seg => { if (seg && seg.coords && seg.coords.length) allCoords.push(...seg.coords); });
  if (allCoords.length > 0) {
    routeLayer = L.polyline(allCoords, {
      color: '#2D5A3D', weight: 3, opacity: 0.75,
      dashArray: travelMode === 'foot-walking' ? '6,6' : null
    }).addTo(map);
  }
}

// ── Time helpers ──
function fmtTime(h, m) {
  const ap = h >= 12 ? 'PM' : 'AM';
  return `${h%12||12}:${String(m).padStart(2,'0')} ${ap}`;
}
function addMins(h, m, mins) {
  const t = h*60 + m + mins;
  return [Math.floor(t/60)%24, t%60];
}

// ── Generate itinerary as HTML table ──
function generateItinerary() {
  const sv = document.getElementById('startTime').value || '09:00';
  const [sh, sm] = sv.split(':').map(Number);
  let curH = sh, curM = sm;
  const date = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const modeLabel = travelMode === 'driving-car' ? 'Driving' : 'Walking';

  let html = `<div class="itinerary-wrap">
    <div class="itin-header">
      <div class="itin-title">Office Leasing Tour — Itinerary</div>
      <div class="itin-meta">${date} &nbsp;·&nbsp; ${modeLabel}</div>
    </div>
    <table class="itin">
      <thead>
        <tr>
          <th>#</th>
          <th>Address</th>
          <th>Suite / Notes</th>
          <th>Time slot</th>
          <th>Duration</th>
          <th>Travel to next</th>
        </tr>
      </thead>
      <tbody>`;

  stops.forEach((s, i) => {
    const appt = s.timeSlot ? s.timeSlot.split(':').map(Number) : null;
    if (appt) { curH = appt[0]; curM = appt[1]; }
    const arrStr = fmtTime(curH, curM);
    const [lh, lm] = addMins(curH, curM, s.duration);
    const leaveStr = fmtTime(lh, lm);
    const seg = travelSegments[i];
    const travelCell = i < stops.length - 1
      ? (seg ? `~${seg.mins} min · ${seg.km} km${seg.estimated?' (est.)':''}` : '—')
      : '—';

    html += `<tr>
      <td>${i+1}</td>
      <td>${s.name}${s.address ? `<br><span style="color:var(--text-muted);font-size:10px;">${s.address}</span>` : ''}</td>
      <td>${s.notes || '—'}</td>
      <td>${arrStr} – ${leaveStr}</td>
      <td>${s.duration} min</td>
      <td>${travelCell}</td>
    </tr>`;

    if (i < stops.length - 1 && seg) {
      [curH, curM] = addMins(lh, lm, seg.mins);
    } else if (i < stops.length - 1) {
      [curH, curM] = addMins(lh, lm, 10);
    }
  });

  html += `</tbody></table></div>`;

  document.getElementById('outputPlaceholder').style.display = 'none';
  const tbl = document.getElementById('itineraryTable');
  tbl.style.display = 'block';
  tbl.innerHTML = html;
}

// ── Copy as plain text (tab-separated, pasteable into Excel/Sheets) ──
function copyItinerary() {
  const sv = document.getElementById('startTime').value || '09:00';
  const [sh, sm] = sv.split(':').map(Number);
  let curH = sh, curM = sm;
  const date = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const modeLabel = travelMode === 'driving-car' ? 'Driving' : 'Walking';

  const lines = [];
  lines.push(`Office Leasing Tour — ${date} — ${modeLabel}`);
  lines.push('');
  lines.push(['#', 'Address', 'Suite / Notes', 'Time Slot', 'Duration', 'Travel to Next'].join('\t'));

  stops.forEach((s, i) => {
    const appt = s.timeSlot ? s.timeSlot.split(':').map(Number) : null;
    if (appt) { curH = appt[0]; curM = appt[1]; }
    const arrStr = fmtTime(curH, curM);
    const [lh, lm] = addMins(curH, curM, s.duration);
    const leaveStr = fmtTime(lh, lm);
    const seg = travelSegments[i];
    const travel = i < stops.length - 1
      ? (seg ? `~${seg.mins} min · ${seg.km} km${seg.estimated?' (est.)':''}` : '—')
      : '—';
    const addr = [s.name, s.address].filter(Boolean).join(', ');
    lines.push([i+1, addr, s.notes||'', `${arrStr} – ${leaveStr}`, `${s.duration} min`, travel].join('\t'));
    if (i < stops.length - 1 && seg) { [curH, curM] = addMins(lh, lm, seg.mins); }
    else if (i < stops.length - 1) { [curH, curM] = addMins(lh, lm, 10); }
  });

  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied ✓';
    setTimeout(() => btn.textContent = 'Copy as text', 2000);
  });
}
</script>
