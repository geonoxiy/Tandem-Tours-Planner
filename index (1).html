<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Office Tour Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --border-strong: #C8C2B8;
    --text: #1A1816;
    --text-muted: #7A7570;
    --text-hint: #B0AAA3;
    --accent: #2D5A3D;
    --accent-light: #EAF2EC;
    --accent-mid: #4A8C5C;
    --warn: #C17B2A;
    --warn-light: #FDF3E3;
    --danger: #B03A2E;
    --danger-light: #FDECEA;
    --info: #2563EB;
    --info-light: #EFF6FF;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 10px;
    --radius-lg: 16px;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  .shell {
    display: grid;
    grid-template-columns: 440px 1fr;
    grid-template-rows: 60px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  header {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
  }
  .logo-mark {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2; }
  header h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  header span { font-size: 13px; color: var(--text-muted); margin-left: 4px; }
  .api-badge {
    margin-left: auto;
    font-size: 11px;
    font-family: var(--mono);
    background: var(--accent-light);
    color: var(--accent);
    border: 1px solid #C5DFC9;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .panel-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  textarea {
    width: 100%;
    min-height: 110px;
    resize: vertical;
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    line-height: 1.7;
    transition: border-color 0.15s;
  }
  textarea:focus { outline: none; border-color: var(--accent-mid); }
  textarea::placeholder { color: var(--text-hint); }

  .input-row { display: flex; gap: 10px; margin-top: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .field label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  input[type="time"], input[type="number"], input[type="text"] {
    font-family: var(--mono);
    font-size: 13px;
    padding: 7px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    width: 100%;
    transition: border-color 0.15s;
  }
  input:focus { outline: none; border-color: var(--accent-mid); }

  /* Time window row */
  .time-window-row {
    display: flex;
    gap: 8px;
    align-items: center;
    background: var(--info-light);
    border: 1px solid #BFDBFE;
    border-radius: var(--radius);
    padding: 10px 12px;
    margin-top: 10px;
  }
  .time-window-row .tw-label {
    font-size: 11px;
    color: var(--info);
    font-weight: 600;
    white-space: nowrap;
  }
  .time-window-row input[type="time"] {
    background: #fff;
    border-color: #BFDBFE;
    font-size: 12px;
    padding: 5px 8px;
  }
  .tw-sep { font-size: 11px; color: var(--text-muted); }

  .mode-toggle { display: flex; gap: 6px; margin-top: 10px; }
  .mode-btn {
    flex: 1;
    padding: 7px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .mode-btn:hover { background: var(--bg); }
  .mode-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .mode-btn.suggested {
    border-color: var(--warn);
    color: var(--warn);
  }
  .mode-btn.suggested.active {
    background: var(--warn);
    color: #fff;
    border-color: var(--warn);
  }

  /* Optimize button */
  .btn-row { display: flex; gap: 8px; margin-top: 12px; }
  .btn-parse {
    flex: 1;
    padding: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-parse:hover { opacity: 0.88; }
  .btn-parse:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-optimize {
    padding: 10px 14px;
    background: var(--warn-light);
    color: var(--warn);
    border: 1px solid #F0D9B0;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
  }
  .btn-optimize:hover { background: #FBE8C5; }
  .btn-optimize:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Suggestion banner */
  .suggestion-banner {
    background: var(--warn-light);
    border: 1px solid #F0D9B0;
    border-radius: var(--radius);
    padding: 10px 12px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--warn);
    display: none;
  }
  .suggestion-banner.show { display: block; }
  .suggestion-banner strong { display: block; margin-bottom: 2px; font-size: 12px; }

  /* Fit status banner */
  .fit-banner {
    border-radius: var(--radius);
    padding: 9px 12px;
    margin-top: 10px;
    font-size: 12px;
    font-weight: 500;
    display: none;
  }
  .fit-banner.show { display: block; }
  .fit-banner.fits { background: var(--accent-light); color: var(--accent); border: 1px solid #C5DFC9; }
  .fit-banner.tight { background: var(--warn-light); color: var(--warn); border: 1px solid #F0D9B0; }
  .fit-banner.over { background: var(--danger-light); color: var(--danger); border: 1px solid #F5C6C2; }

  /* Stops */
  .stops-list { padding: 16px; display: flex; flex-direction: column; gap: 0; flex: 1; }
  .stop-item {
    position: relative;
    padding-left: 28px;
    padding-bottom: 20px;
  }
  .stop-item:last-child { padding-bottom: 0; }
  .stop-line {
    position: absolute;
    left: 10px; top: 22px; bottom: 0;
    width: 1px;
    background: var(--border);
  }
  .stop-item:last-child .stop-line { display: none; }
  .stop-dot {
    position: absolute;
    left: 5px; top: 6px;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--border-strong);
  }
  .stop-dot.first { border-color: var(--accent); background: var(--accent); }
  .stop-dot.last { border-color: var(--warn); background: var(--warn); }

  .stop-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .stop-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
  .stop-num { font-size: 10px; font-family: var(--mono); color: var(--text-hint); }
  .stop-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .stop-address { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: var(--mono); }
  .stop-inputs { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .stop-inputs .field label { font-size: 10px; }
  .stop-inputs input { font-size: 12px; padding: 5px 8px; }

  .travel-seg {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0 6px 0;
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
  }
  .travel-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    white-space: nowrap;
  }
  .travel-pill.loaded { color: var(--accent); border-color: #C5DFC9; background: var(--accent-light); }
  .travel-pill.loading { color: var(--warn); border-color: #F0D9B0; background: var(--warn-light); }
  .travel-pill.error { color: var(--danger); border-color: #F5C6C2; background: var(--danger-light); }
  .travel-pill.walk-suggest {
    color: var(--info);
    border-color: #BFDBFE;
    background: var(--info-light);
    cursor: pointer;
  }

  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #map {
    flex: 1;
    min-height: 0;
  }

  .output-panel {
    height: 260px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .output-toolbar {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .output-toolbar span { font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; flex: 1; }
  .btn-gen {
    padding: 6px 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--sans);
    transition: opacity 0.15s;
  }
  .btn-gen:hover { opacity: 0.88; }
  .btn-gen:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-copy {
    padding: 6px 12px;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: var(--sans);
  }
  .btn-copy:hover { background: var(--bg); }
  .output-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
  }
  pre {
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.9;
    color: var(--text);
    white-space: pre-wrap;
  }
  .placeholder-msg {
    font-size: 13px;
    color: var(--text-hint);
    font-style: italic;
    padding-top: 4px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 13px; height: 13px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
    vertical-align: middle;
  }

  .leaflet-container { font-family: var(--sans); }
  .custom-marker {
    width: 28px; height: 28px;
    background: var(--accent);
    border: 2px solid #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 700;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    font-family: var(--sans);
  }
  .custom-marker.last-stop { background: var(--warn); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
</style>
</head>
<body>

<div class="shell">
  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 16 16"><path d="M8 2C5.8 2 4 3.8 4 6c0 3 4 8 4 8s4-5 4-8c0-2.2-1.8-4-4-4z" stroke-linejoin="round"/><circle cx="8" cy="6" r="1.5"/></svg>
    </div>
    <h1>Office Tour Planner</h1>
    <span>— leasing itinerary builder</span>
    <div class="api-badge">ORS routing ✓</div>
  </header>

  <div class="panel">
    <div class="panel-section">
      <div class="section-label">Locations</div>
      <textarea id="locInput" placeholder="One per line:
Building Name, Address
e.g.
Empire State Building, 350 5th Ave New York NY
Rockefeller Center, 45 Rockefeller Plaza New York NY
One World Trade, 285 Fulton St New York NY"></textarea>

      <div class="input-row">
        <div class="field">
          <label>Default visit (min)</label>
          <input type="number" id="defaultDur" value="30" min="5" max="240" />
        </div>
      </div>

      <!-- Client availability window -->
      <div class="time-window-row">
        <span class="tw-label">🕐 Client window</span>
        <input type="time" id="windowStart" value="09:00" title="Client available from" />
        <span class="tw-sep">to</span>
        <input type="time" id="windowEnd" value="17:00" title="Client available until" />
      </div>

      <div class="section-label" style="margin-top:14px; margin-bottom:6px;">Travel mode</div>
      <div class="mode-toggle">
        <button class="mode-btn active" id="modeD" onclick="setMode('driving-car')">🚗 Drive</button>
        <button class="mode-btn" id="modeW" onclick="setMode('foot-walking')">🚶 Walk</button>
        <button class="mode-btn" id="modeB" onclick="setMode('both')">⇄ Both</button>
      </div>

      <div class="suggestion-banner" id="suggBanner">
        <strong>💡 Mode suggestion</strong>
        <span id="suggText"></span>
      </div>

      <div class="fit-banner" id="fitBanner"></div>

      <div class="btn-row">
        <button class="btn-parse" id="parseBtn" onclick="parseAndGeocode()">
          <span id="parseBtnText">Parse & load locations</span>
        </button>
        <button class="btn-optimize" id="optimizeBtn" onclick="optimizeRoute()" disabled title="Reorder stops to minimize total travel time">
          ✦ Optimize
        </button>
      </div>
    </div>

    <div class="stops-list" id="stopsList">
      <div class="placeholder-msg" style="padding: 8px 0;">Paste locations above and click Parse.</div>
    </div>
  </div>

  <div class="right-panel">
    <div id="map"></div>
    <div class="output-panel">
      <div class="output-toolbar">
        <span>Itinerary</span>
        <button class="btn-gen" id="genBtn" onclick="generateItinerary()" disabled>Generate itinerary</button>
        <button class="btn-copy" id="copyBtn" onclick="copyItinerary()">Copy</button>
      </div>
      <div class="output-body">
        <div class="placeholder-msg" id="outputPlaceholder">Your itinerary will appear here once you load your stops.</div>
        <pre id="outputText" style="display:none;"></pre>
      </div>
    </div>
  </div>
</div>

<script>
const ORS_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBhYjBkMzUwNDZmMTQ4NGU5YTczYjEzY2YxOTJiYTVmIiwiaCI6Im11cm11cjY0In0=';

// WALK_THRESHOLD_KM: if all segments are under this, suggest walking
const WALK_THRESHOLD_KM = 0.4; // ~0.25 miles — typical US walkable city block range

let travelMode = 'driving-car';
let stops = [];
// Each entry: { drive: {mins,km,coords}|null, walk: {mins,km,coords}|null }
let travelSegments = [];
let map, routeLayer;
let markers = [];

// --- MAP INIT ---
// Use a slight delay to ensure DOM is ready
window.addEventListener('DOMContentLoaded', () => {
  map = L.map('map', { zoomControl: true }).setView([39.5, -98.35], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);
});

function setMode(m) {
  travelMode = m;
  document.getElementById('modeD').classList.toggle('active', m === 'driving-car');
  document.getElementById('modeW').classList.toggle('active', m === 'foot-walking');
  document.getElementById('modeB').classList.toggle('active', m === 'both');
  if (stops.length > 0) {
    renderStops();
    drawRoute();
    checkFit();
  }
}

// --- GEOCODING ---
// Multiple fallback strategies for geocoding
async function geocode(query) {
  // Try 1: Nominatim — most reliable for US addresses, no rate-key needed
  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1&countrycodes=us,ca`;
    const r = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    if (r.ok) {
      const d = await r.json();
      if (d && d.length > 0) {
        return { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon), label: d[0].display_name, source: 'nominatim' };
      }
    }
  } catch(e) { console.warn('Nominatim geocode failed:', e); }

  // Try 2: ORS as fallback (no country restriction)
  try {
    const url = `https://api.openrouteservice.org/geocode/search?api_key=${ORS_KEY}&text=${encodeURIComponent(query)}&size=1`;
    const r = await fetch(url);
    if (r.ok) {
      const d = await r.json();
      if (d.features && d.features.length > 0) {
        const [lng, lat] = d.features[0].geometry.coordinates;
        return { lat, lng, label: d.features[0].properties.label, source: 'ors' };
      }
    }
  } catch(e) { console.warn('ORS geocode failed:', e); }

  return null;
}

// --- TRAVEL TIME ---
async function getTravelData(from, to, mode) {
  try {
    const url = `https://api.openrouteservice.org/v2/directions/${mode}?api_key=${ORS_KEY}&start=${from.lng},${from.lat}&end=${to.lng},${to.lat}`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const d = await r.json();
    if (d.features && d.features.length > 0) {
      const seg = d.features[0].properties.segments[0];
      const mins = Math.round(seg.duration / 60);
      const km = parseFloat((seg.distance / 1000).toFixed(2));
      const coords = d.features[0].geometry.coordinates.map(c => [c[1], c[0]]);
      return { mins, km, coords };
    }
  } catch(e) { console.warn('ORS routing failed:', e); }
  return null;
}

// --- HAVERSINE (straight-line distance) ---
function haversineKm(a, b) {
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const ha = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(ha), Math.sqrt(1-ha));
}

// --- PARSE & GEOCODE ---
async function parseAndGeocode() {
  const raw = document.getElementById('locInput').value.trim();
  if (!raw) return;
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const defaultDur = parseInt(document.getElementById('defaultDur').value) || 30;

  const btn = document.getElementById('parseBtn');
  const btnText = document.getElementById('parseBtnText');
  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span> Geocoding...';

  stops = lines.map((line, i) => {
    const parts = line.split(',');
    return {
      id: i,
      raw: line,
      name: parts[0].trim(),
      address: parts.slice(1).join(',').trim(),
      duration: defaultDur,
      timeSlot: '',
      notes: '',
      coords: null
    };
  });

  // Geocode all stops with small delay between to avoid rate limiting
  for (let i = 0; i < stops.length; i++) {
    btnText.innerHTML = `<span class="spinner"></span> Geocoding ${i+1}/${stops.length}…`;
    const query = stops[i].raw;
    const result = await geocode(query);
    if (result) {
      stops[i].coords = result;
      console.log(`✓ Stop ${i+1} (${stops[i].name}):`, result.lat, result.lng, `[${result.source}]`);
    } else {
      console.warn(`✗ Stop ${i+1} (${stops[i].name}): geocoding failed`);
    }
    // Small delay to avoid rate limiting
    if (i < stops.length - 1) await sleep(300);
  }

  travelSegments = new Array(stops.length - 1).fill(null);
  renderStops();
  plotMarkers();
  await fetchAllTravelTimes();
  suggestMode();

  btn.disabled = false;
  btnText.textContent = 'Re-parse & reload';
  document.getElementById('genBtn').disabled = false;
  document.getElementById('optimizeBtn').disabled = false;
  checkFit();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// --- TRAVEL TIME FETCH ---
async function fetchAllTravelTimes() {
  const needDrive = travelMode === 'driving-car' || travelMode === 'both';
  const needWalk  = travelMode === 'foot-walking' || travelMode === 'both';

  for (let i = 0; i < stops.length - 1; i++) {
    if (!stops[i].coords || !stops[i+1].coords) {
      updateTravelPill(i, 'error', 'N/A — location missing');
      continue;
    }
    updateTravelPill(i, 'loading', 'fetching…');

    const seg = { drive: null, walk: null };
    if (needDrive) seg.drive = await getTravelData(stops[i].coords, stops[i+1].coords, 'driving-car');
    if (needWalk)  seg.walk  = await getTravelData(stops[i].coords, stops[i+1].coords, 'foot-walking');
    travelSegments[i] = seg;

    updateTravelPillFromSeg(i, seg);
    if (i < stops.length - 2) await sleep(300);
  }
  drawRoute();
}

function updateTravelPillFromSeg(i, seg) {
  if (!seg) { updateTravelPill(i, 'error', 'Route unavailable'); return; }
  if (travelMode === 'driving-car') {
    seg.drive
      ? updateTravelPill(i, 'loaded', `Drive, ${seg.drive.mins} min`)
      : updateTravelPill(i, 'error', 'Route unavailable');
  } else if (travelMode === 'foot-walking') {
    seg.walk
      ? updateTravelPill(i, 'loaded', `Walk, ${seg.walk.mins} min`)
      : updateTravelPill(i, 'error', 'Route unavailable');
  } else {
    // both
    const d = seg.drive ? `🚗 ${seg.drive.mins}min` : '🚗 N/A';
    const w = seg.walk  ? `🚶 ${seg.walk.mins}min`  : '🚶 N/A';
    updateTravelPill(i, 'loaded', `${d}  ·  ${w}`);
  }
}

function updateTravelPill(idx, state, text) {
  const el = document.getElementById(`travel_${idx}`);
  if (!el) return;
  el.className = `travel-pill ${state}`;
  el.textContent = text;
}

// --- SUGGEST WALK vs DRIVE ---
function suggestMode() {
  const geocodedPairs = stops.filter(s => s.coords);
  if (geocodedPairs.length < 2) return;

  let maxDist = 0;
  let totalDist = 0;
  let pairCount = 0;
  for (let i = 0; i < stops.length - 1; i++) {
    if (stops[i].coords && stops[i+1].coords) {
      const d = haversineKm(stops[i].coords, stops[i+1].coords);
      totalDist += d;
      if (d > maxDist) maxDist = d;
      pairCount++;
    }
  }
  if (pairCount === 0) return;
  const avgDist = totalDist / pairCount;

  const banner = document.getElementById('suggBanner');
  const text = document.getElementById('suggText');

  if (maxDist <= WALK_THRESHOLD_KM) {
    banner.classList.add('show');
    text.textContent = `All stops are within ${(maxDist * 1000).toFixed(0)}m of each other. Walking is recommended — faster and avoids traffic.`;
    // Highlight walk button
    document.getElementById('modeW').classList.add('suggested');
  } else if (maxDist > 2) {
    banner.classList.add('show');
    text.textContent = `Longest leg is ~${maxDist.toFixed(1)} km. Driving is recommended.`;
    document.getElementById('modeD').classList.add('suggested');
  } else {
    banner.classList.remove('show');
  }
}

// --- CHECK IF TOUR FITS IN TIME WINDOW ---
function checkFit() {
  if (stops.length === 0) return;
  const windowStart = document.getElementById('windowStart').value || '09:00';
  const windowEnd = document.getElementById('windowEnd').value || '17:00';
  const [wsh, wsm] = windowStart.split(':').map(Number);
  const [weh, wem] = windowEnd.split(':').map(Number);
  const windowMins = (weh * 60 + wem) - (wsh * 60 + wsm);

  let totalVisit = stops.reduce((s, x) => s + x.duration, 0);
  let totalTravel = travelSegments.reduce((s, seg) => {
    if (!seg) return s + 15;
    if (travelMode === 'foot-walking') return s + (seg.walk ? seg.walk.mins : 20);
    return s + (seg.drive ? seg.drive.mins : (seg.walk ? seg.walk.mins : 15));
  }, 0);
  let totalNeeded = totalVisit + totalTravel;

  const banner = document.getElementById('fitBanner');
  banner.classList.add('show');

  const leftover = windowMins - totalNeeded;
  if (leftover >= 15) {
    banner.className = 'fit-banner show fits';
    banner.textContent = `✓ Tour fits in window — ${fmtMins(totalNeeded)} total, ${fmtMins(leftover)} to spare`;
  } else if (leftover >= 0) {
    banner.className = 'fit-banner show tight';
    banner.textContent = `⚠ Very tight — only ${fmtMins(leftover)} buffer in the ${fmtMins(windowMins)} window`;
  } else {
    banner.className = 'fit-banner show over';
    banner.textContent = `✗ Tour exceeds window by ${fmtMins(-leftover)} — consider removing a stop or shortening visits`;
  }
}

function fmtMins(m) {
  if (m < 60) return `${m}min`;
  return `${Math.floor(m/60)}h ${m%60}min`;
}

// --- OPTIMIZE ROUTE (nearest-neighbor from first stop) ---
async function optimizeRoute() {
  const geocoded = stops.filter(s => s.coords);
  if (geocoded.length < 3) return;

  const btn = document.getElementById('optimizeBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Optimizing…';

  // Build distance matrix (haversine)
  const n = stops.length;
  const dist = Array.from({length: n}, () => new Array(n).fill(0));
  for (let i = 0; i < n; i++)
    for (let j = 0; j < n; j++)
      if (i !== j && stops[i].coords && stops[j].coords)
        dist[i][j] = haversineKm(stops[i].coords, stops[j].coords);
      else
        dist[i][j] = Infinity;

  // Nearest-neighbor heuristic, keeping first stop fixed
  const visited = new Set([0]);
  const order = [0];
  while (order.length < stops.filter(s => s.coords).length) {
    const last = order[order.length - 1];
    let best = -1, bestDist = Infinity;
    for (let j = 0; j < n; j++) {
      if (!visited.has(j) && stops[j].coords && dist[last][j] < bestDist) {
        best = j;
        bestDist = dist[last][j];
      }
    }
    if (best === -1) break;
    visited.add(best);
    order.push(best);
  }

  // Reorder stops
  const newStops = order.map(i => stops[i]);
  // Add any un-geocoded stops at end
  stops.forEach((s, i) => { if (!s.coords) newStops.push(s); });
  stops = newStops;
  travelSegments = new Array(stops.length - 1).fill(null);

  renderStops();
  plotMarkers();
  await fetchAllTravelTimes();
  checkFit();

  btn.disabled = false;
  btn.textContent = '✦ Optimize';
}

// --- RENDER STOPS ---
function renderStops() {
  const container = document.getElementById('stopsList');
  if (!stops.length) {
    container.innerHTML = '<div class="placeholder-msg">Paste locations above and click Parse.</div>';
    return;
  }

  let html = '';
  stops.forEach((s, i) => {
    const isFirst = i === 0;
    const isLast = i === stops.length - 1;
    const dotClass = isFirst ? 'first' : (isLast ? 'last' : '');
    const coordStatus = s.coords
      ? `<div class="stop-address" style="color:#4A8C5C;">📍 ${s.coords.lat.toFixed(5)}, ${s.coords.lng.toFixed(5)}</div>`
      : `<div class="stop-address" style="color:#B03A2E;">⚠ Not located — check spelling</div>`;

    html += `<div class="stop-item">
      <div class="stop-dot ${dotClass}"></div>
      <div class="stop-line"></div>
      <div class="stop-card">
        <div class="stop-card-header">
          <div>
            <div class="stop-num">Stop ${i+1} of ${stops.length}</div>
            <div class="stop-name">${s.name}</div>
            ${s.address ? `<div class="stop-address">${s.address}</div>` : ''}
            ${coordStatus}
          </div>
        </div>
        <div class="stop-inputs">
          <div class="field">
            <label>Duration (min)</label>
            <input type="number" id="dur_${i}" value="${s.duration}" min="5" onchange="stops[${i}].duration=parseInt(this.value)||30; checkFit();" style="width:70px;" />
          </div>
          <div class="field" style="flex:2;">
            <label>Notes (floor, unit, contact)</label>
            <input type="text" id="notes_${i}" value="${s.notes || ''}" placeholder="e.g. 12F · Ana Reyes" onchange="stops[${i}].notes=this.value" />
          </div>
        </div>
      </div>
    </div>`;

    if (i < stops.length - 1) {
      const seg = travelSegments[i];
      let pillClass = 'travel-pill';
      let pillText = 'fetching travel time…';
      if (seg) {
        if (travelMode === 'driving-car') {
          pillText = seg.drive ? `Drive, ${seg.drive.mins} min` : 'Drive unavailable';
        } else if (travelMode === 'foot-walking') {
          pillText = seg.walk ? `Walk, ${seg.walk.mins} min` : 'Walk unavailable';
        } else {
          const d = seg.drive ? `🚗 ${seg.drive.mins}min` : '🚗 N/A';
          const w = seg.walk  ? `🚶 ${seg.walk.mins}min`  : '🚶 N/A';
          pillText = `${d}  ·  ${w}`;
        }
        pillClass = 'travel-pill loaded';
      }
      html += `<div class="travel-seg">
        <div class="${pillClass}" id="travel_${i}">${pillText}</div>
      </div>`;
    }
  });
  container.innerHTML = html;
}

// --- PLOT MARKERS (fixed: use unique layer per marker, proper cleanup) ---
function plotMarkers() {
  // Remove all existing markers
  markers.forEach(m => { if (map) map.removeLayer(m); });
  markers = [];

  const bounds = [];

  stops.forEach((s, i) => {
    if (!s.coords) return;

    const isLast = i === stops.length - 1;
    const markerClass = isLast ? 'custom-marker last-stop' : 'custom-marker';

    const icon = L.divIcon({
      className: '',  // empty — prevents leaflet default styles overriding ours
      html: `<div class="${markerClass}">${i+1}</div>`,
      iconSize: [28, 28],
      iconAnchor: [14, 14],
      popupAnchor: [0, -16]
    });

    const m = L.marker([s.coords.lat, s.coords.lng], { icon })
      .addTo(map)
      .bindPopup(`<strong>${s.name}</strong><br><small>${s.address || ''}</small><br><small style="color:#7A7570;">${s.coords.lat.toFixed(5)}, ${s.coords.lng.toFixed(5)}</small>`);

    markers.push(m);
    bounds.push([s.coords.lat, s.coords.lng]);
  });

  if (bounds.length === 1) {
    map.setView(bounds[0], 16);
  } else if (bounds.length > 1) {
    map.fitBounds(bounds, { padding: [50, 50] });
  }
}

// --- DRAW ROUTE ---
let routeLayerWalk = null;
function drawRoute() {
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  if (routeLayerWalk) { map.removeLayer(routeLayerWalk); routeLayerWalk = null; }

  const driveCoords = [], walkCoords = [];
  travelSegments.forEach(seg => {
    if (!seg) return;
    if (seg.drive && seg.drive.coords) driveCoords.push(...seg.drive.coords);
    if (seg.walk  && seg.walk.coords)  walkCoords.push(...seg.walk.coords);
  });

  if (travelMode === 'driving-car' || travelMode === 'both') {
    if (driveCoords.length > 0) {
      routeLayer = L.polyline(driveCoords, { color: '#2D5A3D', weight: 3.5, opacity: 0.75 }).addTo(map);
    }
  }
  if (travelMode === 'foot-walking' || travelMode === 'both') {
    if (walkCoords.length > 0) {
      routeLayerWalk = L.polyline(walkCoords, { color: '#2563EB', weight: 3, opacity: 0.7, dashArray: '7,7' }).addTo(map);
    }
  }
}

// --- TIME HELPERS ---
function fmtTime(h, m) {
  const ap = h >= 12 ? 'PM' : 'AM';
  const hh = h % 12 || 12;
  return `${hh}:${String(m).padStart(2,'0')} ${ap}`;
}
function addMins(h, m, mins) {
  const t = h * 60 + m + mins;
  return [Math.floor(t / 60) % 24, t % 60];
}
function toTotalMins(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}

// --- GENERATE ITINERARY ---
function generateItinerary() {
  const windowStart = document.getElementById('windowStart').value || '09:00';
  const windowEnd = document.getElementById('windowEnd').value || '17:00';
  const [sh, sm] = windowStart.split(':').map(Number);
  let curH = sh, curM = sm;

  const date = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  const modeLabel = travelMode === 'driving-car' ? 'Drive' : travelMode === 'foot-walking' ? 'Walk' : 'Drive + Walk';

  // Total time needed — use drive for 'both' scheduling
  let totalVisit = stops.reduce((s, x) => s + x.duration, 0);
  let totalTravel = travelSegments.reduce((s, seg) => {
    if (!seg) return s + 15;
    if (travelMode === 'foot-walking') return s + (seg.walk ? seg.walk.mins : 20);
    return s + (seg.drive ? seg.drive.mins : (seg.walk ? seg.walk.mins : 15));
  }, 0);
  let totalMins = totalVisit + totalTravel;

  const [weh, wem] = windowEnd.split(':').map(Number);
  const windowMins = (weh * 60 + wem) - (sh * 60 + sm);
  const fits = totalMins <= windowMins;

  let lines = [];
  lines.push('══════════════════════════════════════════');
  lines.push('  OFFICE LEASING TOUR — ITINERARY');
  lines.push(`  ${date}`);
  lines.push(`  Travel mode: ${modeLabel}`);
  lines.push(`  Client window: ${fmtTime(sh, sm)} – ${fmtTime(weh, wem)}`);
  lines.push(`  Estimated total: ${fmtMins(totalMins)}${fits ? ' ✓' : ' ⚠ OVER WINDOW'}`);
  lines.push('══════════════════════════════════════════');
  lines.push('');

  stops.forEach((s, i) => {
    const arrStr = fmtTime(curH, curM);
    const [lh, lm] = addMins(curH, curM, s.duration);
    const leaveStr = fmtTime(lh, lm);

    const overWindow = (curH * 60 + curM) > (weh * 60 + wem);
    const flag = overWindow ? '  ⚠ OUTSIDE CLIENT WINDOW' : '';

    lines.push(`STOP ${i+1}  ·  ${s.name}${flag}`);
    if (s.address) lines.push(`         ${s.address}`);
    lines.push(`         ${arrStr} – ${leaveStr}  (${s.duration} min)`);
    if (s.notes) lines.push(`         Notes: ${s.notes}`);
    if (!s.coords) lines.push(`         ⚠ Location not geocoded`);

    if (i < stops.length - 1) {
      const seg = travelSegments[i];
      let travelLine = '';
      let travelMins = 15;
      if (seg) {
        if (travelMode === 'driving-car' && seg.drive) {
          travelLine = `Drive, ${seg.drive.mins} min · ${seg.drive.km} km`;
          travelMins = seg.drive.mins;
        } else if (travelMode === 'foot-walking' && seg.walk) {
          travelLine = `Walk, ${seg.walk.mins} min · ${seg.walk.km} km`;
          travelMins = seg.walk.mins;
        } else {
          const dp = seg.drive ? `Drive ${seg.drive.mins}min` : '';
          const wp = seg.walk  ? `Walk ${seg.walk.mins}min`  : '';
          travelLine = [dp, wp].filter(Boolean).join('  ·  ');
          travelMins = seg.drive ? seg.drive.mins : (seg.walk ? seg.walk.mins : 15);
        }
      } else {
        travelLine = 'Travel time unavailable';
      }
      lines.push('');
      lines.push(`  → ${travelLine}  →  ${stops[i+1].name}`);
      lines.push('  ──────────────────────────────────────');
      lines.push('');
      [curH, curM] = addMins(lh, lm, travelMins);
    } else {
      lines.push('');
      lines.push('══════════════════════════════════════════');
      lines.push(`  Tour ends: ${leaveStr}`);
      if (!fits) {
        lines.push(`  ⚠ Ends ${fmtMins(totalMins - windowMins)} after client window`);
      }
      lines.push('══════════════════════════════════════════');
    }
  });

  const text = lines.join('\n');
  document.getElementById('outputPlaceholder').style.display = 'none';
  const out = document.getElementById('outputText');
  out.style.display = 'block';
  out.textContent = text;
}

function copyItinerary() {
  const text = document.getElementById('outputText').textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied ✓';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}
